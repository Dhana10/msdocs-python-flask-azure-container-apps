name: Infra

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - '.github/workflows/infra.yml'
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC token exchange
  contents: read

env:
  AZURE_LOCATION: ${{ vars.AZURE_LOCATION || 'eastus' }}

jobs:
  deploy:
    name: Deploy infrastructure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── OIDC login — no stored client secret ─────────────────────────────
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ vars.AZURE_CLIENT_ID }}
          tenant-id:       ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      # ── Resource group ────────────────────────────────────────────────────
      - name: Create resource group
        run: |
          az group create \
            --name     "${{ vars.RESOURCE_GROUP }}" \
            --location "${AZURE_LOCATION}" \
            --tags     application=restrev

      # ── Resolve service-principal object ID for AcrPush role ─────────────
      # vars.AZURE_CLIENT_ID is the App Registration's *application* ID.
      # The Bicep template needs the *object* ID of the enterprise application.
      - name: Get service-principal object ID
        id: sp
        run: |
          OID="$(az ad sp show --id "${{ vars.AZURE_CLIENT_ID }}" --query id -o tsv)"
          echo "oid=${OID}" >> "${GITHUB_OUTPUT}"

      # ── Bicep deployment ──────────────────────────────────────────────────
      - name: Deploy Bicep
        run: |
          az deployment group create \
            --resource-group "${{ vars.RESOURCE_GROUP }}" \
            --template-file  infra/main.bicep \
            --parameters \
              acrName="${{ vars.ACR_NAME }}" \
              deployerPrincipalId="${{ steps.sp.outputs.oid }}" \
              flaskSecretKey="${{ secrets.FLASK_SECRET_KEY }}"
