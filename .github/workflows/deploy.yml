name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  id-token: write   # required for OIDC token exchange
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build, push, and deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── OIDC login — no stored client secret ─────────────────────────────
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ vars.AZURE_CLIENT_ID }}
          tenant-id:       ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      # ── Authenticate local Docker daemon to ACR ───────────────────────────
      - name: Log in to ACR
        run: az acr login --name "${{ vars.ACR_NAME }}"

      # ── Build and push image ──────────────────────────────────────────────
      # Uses local docker build (no ACR build-service charges).
      # Image is tagged with the commit SHA for traceability.
      - name: Build and push Docker image
        id: image
        run: |
          set -e
          LOGIN_SERVER="$(az acr show --name "${{ vars.ACR_NAME }}" --query loginServer -o tsv)"
          IMAGE="${LOGIN_SERVER}/restrev/api:${GITHUB_SHA}"
          docker build --tag "${IMAGE}" ./backend
          docker push "${IMAGE}"
          echo "image=${IMAGE}" >> "${GITHUB_OUTPUT}"

      # ── Roll out the new image to the Container App ───────────────────────
      - name: Deploy to Container App
        run: |
          az containerapp update \
            --name             "${{ vars.CONTAINER_APP_NAME }}" \
            --resource-group   "${{ vars.RESOURCE_GROUP }}" \
            --image            "${{ steps.image.outputs.image }}"
