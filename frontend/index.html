<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Restaurant reviews</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="header">
    <h1>Restaurant reviews</h1>
    <p class="muted">Powered by Azure Static Web Apps + Container Apps</p>
  </header>

  <main class="main">
    <section class="card" id="list-section">
      <div class="section-head">
        <h2>Restaurants</h2>
        <button type="button" id="btn-refresh" class="btn secondary">Refresh</button>
      </div>
      <div id="restaurant-list" class="list"></div>
      <p id="list-error" class="error hidden"></p>
    </section>

    <section class="card">
      <h2>Add restaurant</h2>
      <form id="form-restaurant" class="form">
        <label>Name <input name="name" required /></label>
        <label>Street <input name="street_address" /></label>
        <label>Description <input name="description" required /></label>
        <button type="submit" class="btn">Create</button>
        <p id="form-restaurant-msg" class="msg"></p>
      </form>
    </section>

    <section class="card hidden" id="detail-section">
      <div class="section-head">
        <h2 id="detail-title">Details</h2>
        <button type="button" id="btn-close-detail" class="btn secondary">Close</button>
      </div>
      <p id="detail-meta" class="muted"></p>
      <h3>Reviews</h3>
      <div id="review-list" class="list"></div>
      <h3>Add review</h3>
      <form id="form-review" class="form">
        <input type="hidden" name="restaurant_id" id="review-restaurant-id" />
        <label>Your name <input name="user_name" required /></label>
        <label>Rating (1–5) <input name="rating" type="number" min="1" max="5" required /></label>
        <label>Comments <input name="review_text" /></label>
        <button type="submit" class="btn">Submit review</button>
        <p id="form-review-msg" class="msg"></p>
      </form>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="app.js" type="module"></script>
</body>
</html>
